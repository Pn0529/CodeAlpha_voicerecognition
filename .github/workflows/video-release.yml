name: Build and Release Explanatory Video

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for the new release'
        required: true
        default: 'video-1.0.0'
      release_name:
        description: 'Release name'
        required: false
        default: 'Speech Emotion Recognition Video'
      prerelease:
        description: 'Create a prerelease?'
        required: false
        default: 'true'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate video assets
        run: python generate_video_assets.py

      - name: Build explanatory video
        run: python assemble_video.py

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: 'Automatically generated explanatory video for the Speech Emotion Recognition project.'
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: final_video.mp4
          asset_name: final_video.mp4
          asset_content_type: video/mp4
